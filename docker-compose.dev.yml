services:
  ros2-dev:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: dev
    network_mode: bridge
    privileged: true
    env_file:
      - ./docker/.env
    environment: 
      -  CYCLONEDDS_URI=file:///dds/cyclonedds_mac.xml
    volumes:
      - ./ros2_ws/src:/ros2_ws/src
      - ./dds/cyclonedds_mac.xml:/dds/cyclonedds_mac.xml
    stdin_open: true
    tty: true
